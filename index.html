<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suporte - GX Gaming Brasil</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #080c17;
      color: #fff;
    }

    header {
      background: #11182a;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      color: #00C5CD;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #11182a, #0b0f1a);
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    form {
      max-width: 500px;
      margin: 0 auto;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
    }

    input[type="email"] {
      background: #2e3757;
      color: #000;
    }

    textarea {
      background: #fff;
      color: #062338;
      resize: vertical;
      min-height: 120px;
    }

    button {
      padding: 12px 25px;
      background: #00C5CD;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1C1C1C;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1f2a44;
      color: #777;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Entre em contato com nosso Suporte</h1>
  </header>

  <section class="hero">
    <h2>Envie sua mensagem</h2>
    <form action="#" method="post">
      <label for="email">Seu e-mail:</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

      <label for="problema">Descreva o problema:</label>
      <textarea id="problema" name="problema" placeholder="Explique o que aconteceu..." required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </section>

  <footer>
    <p>© 2026 GX Gaming Brasil</p>
  </footer>
</body>
</html>
